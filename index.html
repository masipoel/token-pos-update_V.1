    function autoFillDariMeter() {

    // Fungsi Waktu Acak (08:15 s/d 15:45, Bulan Jan - Sekarang, Bukan Hari Minggu/Libur)
    function setWaktuAcak() {
        const end = new Date(); // Hari ini (Bulan berjalan saat ini)
        const start = new Date(end.getFullYear(), 0, 1); // 1 Januari tahun ini

        let randomDate;
        let isValid = false;

        // Daftar tanggal libur nasional (Bulan-Tanggal)
        const liburNasional = ["1-1", "5-1", "8-17", "12-25"];

        while (!isValid) {
            randomDate = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
            const day = randomDate.getDay();
            const dateStr = `${randomDate.getMonth() + 1}-${randomDate.getDate()}`;

            // Cek bukan hari Minggu (0) dan bukan Libur Nasional
            if (day !== 0 && !liburNasional.includes(dateStr)) {
                isValid = true;
            }
        }

        // Acak Jam antara 8 dan 15
        let jam = Math.floor(Math.random() * (15 - 8 + 1)) + 8;
        let menit = 0;
        let detik = Math.floor(Math.random() * 60);

        if (jam === 8) {
            // Jika jam 8, menit harus antara 15 s/d 59 (Mulai jam kerja 08:15)
            menit = Math.floor(Math.random() * (59 - 15 + 1)) + 15; 
        } else if (jam === 15) {
            // Jika jam 15, menit maksimum di 45 (Batas akhir 15:45)
            menit = Math.floor(Math.random() * (45 - 0 + 1)) + 0; 
        } else {
            // Jam normal (xx:00 s/d xx:59)
            menit = Math.floor(Math.random() * 60); 
        }

        const dd = String(randomDate.getDate()).padStart(2, '0');
        const mm = String(randomDate.getMonth() + 1).padStart(2, '0');
        const yyyy = randomDate.getFullYear();
        const hh = String(jam).padStart(2, '0');
        const min = String(menit).padStart(2, '0');
        const ss = String(detik).padStart(2, '0');

        document.getElementById('entry_tanggal').value = `${dd}-${mm}-${yyyy} ${hh}:${min}:${ss}`;
    }

    // Hitung KWH berdasarkan tarif khusus
    function hitungKWH(nominal, daya) {
        let d = daya.toUpperCase();
        
        const tarifPapua1300_2200 = 500000 / 657.9; 
        const rasioDiskon = tarifPapua1300_2200 / 1444.70; 

        let tarif = tarifPapua1300_2200; 
        
        if (d.includes("450")) {
            tarif = 415; 
        } else if (d.includes("R1/900")) {
            tarif = 605; 
        } else if (d.includes("R1M/900")) {
            tarif = 1352 * rasioDiskon;
        } else if (d.includes("1300") || d.includes("2200")) {
            tarif = tarifPapua1300_2200; 
        } else if (d.includes("3500") || d.includes("4400") || d.includes("5500") || d.includes("6600")) {
            tarif = 1699.53 * rasioDiskon; 
        }
        
        let kwh = nominal / tarif;
        return kwh.toFixed(1).replace(".", ",");
    }

    async function pindaiPrinter() {
        if (!navigator.bluetooth) {
            alert("Browser Anda tidak mendukung Web Bluetooth API. Pastikan akses via HTTPS atau localhost.");
            return;
        }
        try {
            document.getElementById('statusPrinter').style.display = 'block';
            document.getElementById('statusPrinter').innerText = 'Status: Memindai...';
            document.getElementById('statusPrinter').style.color = 'orange';

            bluetoothDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2']
            });

            const server = await bluetoothDevice.gatt.connect();
            const services = await server.getPrimaryServices();
            let foundCharacteristic = false;

            for (const service of services) {
                const characteristics = await service.getCharacteristics();
                for (const characteristic of characteristics) {
                    if (characteristic.properties.write || characteristic.properties.writeWithoutResponse) {
                        printerCharacteristic = characteristic;
                        foundCharacteristic = true;
                        break;
                    }
                }
                if (foundCharacteristic) break;
            }

            if (printerCharacteristic) {
                const namaPerangkat = bluetoothDevice.name || 'Printer Thermal';
                document.getElementById('combo_port').innerHTML = `<option value="connected">${namaPerangkat}</option>`;
                document.getElementById('statusPrinter').innerText = 'Status: Terhubung (' + namaPerangkat + ')';
                document.getElementById('statusPrinter').style.color = 'green';
                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                alert(`Berhasil terhubung ke printer: ${namaPerangkat}`);
            }
        } catch (error) {
            console.error(error);
            document.getElementById('statusPrinter').innerText = 'Status: Koneksi Gagal';
            document.getElementById('statusPrinter').style.color = 'red';
        }
    }

    function onDisconnected() {
        document.getElementById('statusPrinter').innerText = 'Status: Terputus!';
        document.getElementById('statusPrinter').style.color = 'red';
        document.getElementById('combo_port').innerHTML = `<option value="none">Printer Terputus...</option>`;
        printerCharacteristic = null;
    }

    async function buildReceiptCanvas(htmlText, logoSrc, textPhone, textIG, printWidthDots = 576) {
        const loadImage = (src) => new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = src;
        });

        const logoImg = await loadImage(logoSrc);
        const phoneImg = await loadImage("phone.png");
        const igImg = await loadImage("instagram.png");

        const lines = htmlText.split('\n');
        const fontSize = 23; 
        const lineHeight = 32;

        let totalHeight = 10; 
        let logoWidth = 185; 
        let logoHeight = 0;
        
        if (logoImg) {
            logoHeight = Math.floor((logoWidth / logoImg.width) * logoImg.height);
            totalHeight += logoHeight + 20; 
        }
        
        totalHeight += (lines.length * lineHeight); 
        totalHeight += 95; 

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = Math.floor(printWidthDots / 8) * 8;
        canvas.height = totalHeight;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let currentY = 10;

        if (logoImg) {
            const logoX = (canvas.width - logoWidth) / 2;
            ctx.drawImage(logoImg, logoX, currentY, logoWidth, logoHeight);
            currentY += logoHeight + 20;
        }

        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        for (let line of lines) {
            let isBold = line.includes('<span class="bold-text">');
            let cleanLine = line.replace(/<[^>]*>?/gm, ''); 

            if (isBold) {
                ctx.font = `bold ${fontSize}px 'Courier New', Courier, monospace`;
            } else {
                ctx.font = `${fontSize}px 'Courier New', Courier, monospace`;
            }
            ctx.fillStyle = "black";
            ctx.fillText(cleanLine, 12, currentY); 
            currentY += lineHeight;
        }

        const margin = 10; 
        const iconSize = 24;
        const gap = 6; 
        
        ctx.textBaseline = "middle";
        const footerMidY = currentY + (iconSize / 2);
        const footerFont = `22px 'Courier New', Courier, monospace`;

        ctx.textAlign = "left";
        ctx.font = footerFont;
        if (phoneImg) {
            ctx.drawImage(phoneImg, margin, currentY, iconSize, iconSize);
            ctx.fillText(textPhone, margin + iconSize + gap, footerMidY);
        } else {
            ctx.fillText("📞 " + textPhone, margin, footerMidY);
        }

        ctx.textAlign = "right";
        if (igImg) {
            const textWidth = ctx.measureText(textIG).width;
            const iconX = canvas.width - margin - textWidth - gap - iconSize;
            ctx.drawImage(igImg, iconX, currentY, iconSize, iconSize);
            ctx.fillText(textIG + " ", canvas.width - margin, footerMidY);
        } else {
            ctx.fillText("IG:" + textIG + " ", canvas.width - margin, footerMidY);
        }

        return canvas;
    }

    function sliceCanvasForPrinter(canvas) {
        const ctx = canvas.getContext('2d');
        const MAX_SLICE_HEIGHT = 200; 
        const slices = [];
        
        for (let sliceY = 0; sliceY < canvas.height; sliceY += MAX_SLICE_HEIGHT) {
            const sliceHeight = Math.min(MAX_SLICE_HEIGHT, canvas.height - sliceY);
            const imgData = ctx.getImageData(0, sliceY, canvas.width, sliceHeight).data;
            
            const xL = (canvas.width / 8) % 256;
            const xH = Math.floor((canvas.width / 8) / 256);
            const yL = sliceHeight % 256;
            const yH = Math.floor(sliceHeight / 256);

            const data = [];
            data.push(0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH); 

            for (let y = 0; y < sliceHeight; y++) {
                for (let x = 0; x < canvas.width; x += 8) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const idx = ((y * canvas.width) + x + bit) * 4;
                        const r = imgData[idx];
                        const g = imgData[idx + 1];
                        const b = imgData[idx + 2];
                        const alpha = imgData[idx + 3];

                        const grayscale = (r * 0.299 + g * 0.587 + b * 0.114);
                        if (grayscale < 128 && alpha > 128) {
                            byte |= (1 << (7 - bit));
                        }
                    }
                    data.push(byte);
                }
            }
            slices.push(new Uint8Array(data));
        }
        
        return slices;
    }

    async function kirimKePrinterAsli(canvas) {
        if (!printerCharacteristic) return false;

        try {
            const imageChunks = sliceCanvasForPrinter(canvas);
            
            const initCmd = new Uint8Array([0x1B, 0x40]); 
            const alignLeftCmd = new Uint8Array([0x1B, 0x61, 0x00]); 
            const lineFeedCmd = new Uint8Array([0x0A, 0x0A, 0x0A, 0x0A, 0x0A]); 
            
            let totalLength = initCmd.length + alignLeftCmd.length;
            for (const chunk of imageChunks) totalLength += chunk.length;
            totalLength += lineFeedCmd.length;
            
            const payload = new Uint8Array(totalLength);
            
            let offset = 0;
            payload.set(initCmd, offset); offset += initCmd.length;
            payload.set(alignLeftCmd, offset); offset += alignLeftCmd.length;
            
            for (const chunk of imageChunks) {
                payload.set(chunk, offset); offset += chunk.length;
            }
            
            payload.set(lineFeedCmd, offset);

            const CHUNK_SIZE = 256; 
            for (let i = 0; i < payload.length; i += CHUNK_SIZE) {
                const chunk = payload.slice(i, i + CHUNK_SIZE);
                if (printerCharacteristic.properties.writeWithoutResponse) {
                    await printerCharacteristic.writeValueWithoutResponse(chunk);
                } else {
                    await printerCharacteristic.writeValue(chunk);
                }
                await new Promise(r => setTimeout(r, 40)); 
            }
            return true;
        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan: " + error.message);
            return false;
        }
    }

    function buatTokenAcak() {
        let token = "";
        for (let i = 0; i < 20; i++) token += Math.floor(Math.random() * 10).toString();
        return `${token.substring(0,4)} ${token.substring(4,8)} ${token.substring(8,12)} ${token.substring(12,16)} ${token.substring(16,20)}`;
    }

    function formatRp(angka, tambahKoma = false) {
        let hasil = parseInt(angka).toLocaleString('id-ID');
        if (tambahKoma) hasil += ",00";
        return hasil;
    }

    function centerText(text, width = 42) {
        if (text.length >= width) return text;
        const pad = Math.floor((width - text.length) / 2);
        return " ".repeat(pad) + text;
    }

    function padLeft(text, width) {
        return String(text).padStart(width, ' ');
    }

    async function prosesTransaksi() {
        saveData();

        const kpc = document.getElementById('entry_kpc').value;
        const meter = document.getElementById('entry_meter').value;
        
        if (!meter) {
            alert("Silakan pilih No. Meter terlebih dahulu!");
            return;
        }
        
        const idpel = document.getElementById('combo_idpel').value;
        const nama = document.getElementById('entry_nama').value;
        
        let dayaRaw = document.getElementById('combo_daya').value;
        const daya = dayaRaw.split(" ")[0] + " VA"; 

        const nominalStroom = parseInt(document.getElementById('combo_nominal').value);
        const adminPos = parseInt(document.getElementById('combo_admin').value);
        const strTanggal = document.getElementById('entry_tanggal').value;

        const rpBayar = nominalStroom + adminPos;
        
        let jmlKwh = hitungKWH(nominalStroom, dayaRaw);

        // --- PENYESUAIAN NO RESI DAN PETUGAS OTOMATIS BERDASARKAN KPC ---
        let prefixResi = "98356-21"; 
        let petugas = "734026831";   

        if (kpc === "Kpc. Manokwari Sanggeng 98312A") {
            prefixResi = "98312A-09";
            petugas = "5500593388"; 
        } else if (kpc === "Kpc Prafi 98356") {
            prefixResi = "98356-21";
            petugas = "734026831";
        }

        const resi = `${prefixResi}/${new Date().getFullYear()}/${Math.floor(Math.random() * 900000) + 100000}`;
        // ----------------------------------------------------------------

        const noRef = `1098356069${petugas}99${Math.floor(Math.random() * 900000000) + 100000000}`;
        const token = buatTokenAcak();

        await cetakKePrinter(kpc, meter, idpel, nama, daya, nominalStroom, adminPos, rpBayar, jmlKwh, strTanggal, resi, petugas, noRef, token);
    }

    async function cetakKePrinter(kpc, meter, idpel, nama, daya, stroom, admin, bayar, kwh, tanggal, resi, petugas, noRef, token) {
        const fBayar = formatRp(bayar);
        const fStroom = formatRp(stroom, true);
        const fAdmin = formatRp(admin);

        let strukBaseTeks = 
            centerText("PT POS INDONESIA (PERSERO)") + "\n" +

            `<span class="bold-text">` + centerText("TANDA TERIMA") + `</span>\n` +
            `<span class="bold-text">` + centerText("TAGIHAN PLN PREPAID") + `</span>\n` +

            `Tanggal   : ${tanggal}\n` +

            `NO METER       : ${meter}\n` +
            `IDPEL          : ${idpel}\n` +
            `NAMA           : ${nama.toUpperCase()}\n` +
            `TARIF/DAYA     : ${daya}\n` +
            `NO REF         : \n` +
            `${noRef}\n` +
            `RP BAYAR       : RP. ${padLeft(fBayar, 14)}\n` +
            `METERAI        : RP.              0,00\n` +
            `PPN            : RP.              0,00\n` +
            `PBJT-TL        : RP.              0,00\n` +
            `ANGSURAN       : RP.              0,00\n` +
            `RP STROOM/TOKEN: RP.    ${padLeft(fStroom, 14)}\n` +
            `JML KWH        :     ${padLeft(kwh, 14)}\n` +
            `ADMIN POS      : RP. ${padLeft(fAdmin, 14)}\n` +
            `<span class="bold-text">STROOM / TOKEN : ${token}</span>\n\n` +
            centerText("POS IND") + "\n" +
            centerText("Info Hubungi Call Center 123 Atau") + "\n" +
            centerText("hubungi PLN Terdekat") + "\n" +
            centerText("Download PLN Mobile") + "\n" +
            "NPWP : 01.001.620.2-093.000 a.n PT Pos\n" +
            "Indonesia\n" +
            "------------------------------------------\n" +
            centerText("Simpan resi ini sbg bukti pembayaran sah.") + "\n" +
            centerText("Kami sangat menghargai privasi Bp/Ibu.") + "\n" +
            centerText("Informasi data pribadi yang diberikan") + "\n" +
            centerText("hanya diproses untuk penyelenggaraan") + "\n" +
            centerText("layanan yg Bp/Ibu gunakan. Data Pribadi") + "\n" +
            centerText("yang disertakan dalam transaksi ini") + "\n" +
            centerText("diproses sesuai dgn kebijakan privasi") + "\n" +
            centerText("yang berlaku dan dapat diakses pada") + "\n\n" +
            `<span class="bold-text">` + centerText("www.posindonesia.co.id") + `</span>\n\n` +
            centerText("Terima kasih telah memilih kami,") + "\n" +
            centerText("Sampai jumpa di transaksi berikutnya...") + "\n\n" +
            centerText("Untuk informasi hubungi"); 

        const logoURL = "logo.png"; 
        
        const canvas = await buildReceiptCanvas(strukBaseTeks, logoURL, "Halo Pos 1500161", " @posindonesia.ig", 576);
        const dataUrl = canvas.toDataURL("image/png");

        document.getElementById('strukOutput').innerHTML = `<img src="${dataUrl}" class="struk-img-preview" alt="Struk Real">`;
        document.getElementById('modalStruk').style.display = 'flex';

        if (printerCharacteristic) {
            const btn = document.getElementById('btnCetak');
            btn.innerText = "SEDANG MENCETAK (MOHON TUNGGU)...";
            btn.disabled = true;

            await kirimKePrinterAsli(canvas);
            
            btn.innerText = "CETAK STRUK (80MM)";
            btn.disabled = false;
        }
    }

    function tutupSimulasi() {
        document.getElementById('modalStruk').style.display = 'none';
        setWaktuAcak(); // Diacak kembali saat struk ditutup
    }
</script>
